  # projects
  projects:
    enable: true
    # title: "Custom Name"
    items:
     
     
      - title: Kagemusha
        content: Team Hydra's first project, Kagemusha is a first person stealth game being developed as we speak. As of early may, we have an alpha build ready, in order to showcase our work, which
         you can play right now!      
         
        image: /images/kagemusha.png
        featured:
          name: Demo
          link: https://geratt.itch.io/kagemusha-public-demo 
        #badges:
        #  - "Unreal"
        #  - "Demo"
        #links:
        #  - icon: fa fa-envelope
        #    url: mailto:?subject=Hugo%20Profile%20Template&body=Check%20it%20out:%20https%3a%2f%2fhugo-profile.netlify.app%2fblog%2fmarkdown-syntax%2f
        #  - icon: fab fa-github
        #    url: https://github.com/gurusabarish/hugo-profile
        #  - icon: fab fa-twitter
        #    url: https://twitter.com/intent/tweet?text=Check+it+out:&url=https%3A%2F%2Fgithub.com%2Fgurusabarish%2Fhugo-profile
      
      - title: A Treatise Concerning Correct Combat Conduct for Officers in the Theatre of War
        content: 
          This project is an interactive art piece, as well as a game rolled into one. I constructed it by hand, designed the pieces and the board myself, as well as learned photography just to 
          document it for others to see. It is a commentary on the romanticism surrounding glory in battle, 
          especially further back in time, as this game is set in the Napoleonic era.  
         
        image: /images/photos/IMG (5).jpg
        featured:
          name: Images
          link: https://geratt.itch.io/tccc

      - title: Ennui at the Disco
        content: Made in a simple game engine called Môsi, this game is intended to convey its themes more through its writing and story as opposed to its depth of game mechanics. You play as our hero, Steve, and follow his investigation into the newest Nightclub that opened up in his town.
        image: /images/Untitled.png
        featured:
          name: Play Now
          link: https://geratt.itch.io/ennui-at-the-disco
        
        
      - title: The Motte and Bailey Fallacy
        content: This demo showcases my level design abilities in Unity. You play as a hired assassin sent to kill the king of an opposing nation. How you go about this task is 
         up to you, all the while avoiding or dispatching the guards.
        image: /images/22.png
        featured:
          name: Demo
          link: https://geratt.itch.io/ennui-at-the-disco
        
      - title: Symmetry Survivors
        content: This game was made for the UKIE Student Game Jam 2026 where the theme was Symmetry.I served as the primary game designer, as well as the composer. 
        image: /images/symmetry.png
        featured:
          name: Play Now
          link: https://geratt.itch.io/symmetry-survivors
        
        
