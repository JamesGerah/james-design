params:
  title: "James' Design Portfolio"
  description: My Game Design Portfolio Site.
  #staticPath: \static  
  favicon: "/chaos.svg"

  # Whether to serve bootstrap css and js files from CDN or not. Can be set to true, "css" or "js" to choose between
  # serving both, only the css, or only the js files through the CDN. Any other value will make so that CDN is not used.
  # Note the lack of "" in true, it should be of boolean type.
  useBootstrapCDN: false

  # If you want to load dynamically responsive images from Cloudinary
  # This requires your images to be uploaded + hosted on Cloudinary
  # Ujax support on all pages. Alternatively, you can opt-in per page by adding `mathjax: true` in the frontmatter.
  #mathjax: falsencomment and change YOUR_CLOUD_NAME to the Cloud Name in your Cloudinary console
  # cloudinary_cloud_name: "YOUR_CLOUD_NAME"

  # Whether to add math

  # Whether the fade animations on the home page will be enabled
  animate: true

  font:
    fontSize: 1rem # default: 1rem
    fontWeight: 400 # default: 400
    lineHeight: 1.5 # default: 1.5
    textAlign: left # default: left

  theme:
   disableThemeToggle: true
   defaultTheme: "light"
  # color preference
  # When using hex codes for colors, quotations must be used along with the # sign
  color:
    textColor: "#fb8b4e"
    secondaryTextColor: "#f9f4df"
    textLinkColor: "#f9f4df"
    backgroundColor: "#221d38"
    secondaryBackgroundColor: "#4784B3"
    primaryColor: "#f2c56e"
    secondaryColor: "#372E8C"

  # If you want to customize the menu, you can change it here
  navbar:
    align: ms-auto # Left: ms-auto | center: mx-auto | right: me-auto | Default: ms-auto
    brandLogo: "/chaos.svg" # Logo for the brand | default is the favicon variable
    showBrandLogo: true # Show brand logo in nav bar | default is true
    brandName: "James Geraty - Game Designer" # Brand name for the brand | default is the title variable
    disableSearch: true
    # searchPlaceholder: "Search"
    stickyNavBar:
      enable : true
      showOnScrollUp : true
    enableSeparator: false
    menus:
      disableAbout: false
      disableExperience: false
      disableEducation: false
      disableProjects: false
      disableAchievements: false
      disableContact: false

  # Hero
  hero:
    enable: true
    intro: "Hello. I am"
    title: "James."
    subtitle: "Practicing Game Designer  Aspiring Ludologist"
    content: "Having realised 6 years ago that my true passion lay in the creation of interactive and engaging experiences for others, I have been persuing this goal ever since."
    image: /images/james4.jpg
    bottomImage1:
      enable: true
    # roundImage: true # Make hero image circular | default false
    button:
      enable: true
      name: "CV"
      url: "https://1drv.ms/w/c/0be8ac1b1445af07/IQBioCoEmXtkQ5ufYDf45wDLASu7J_B6B9VACY_u8r1Jvzs?e=d2bL1Y"

      download: true
      newPage: true
    socialLinks:
      customIcons:
      - icon: /itch.svg
        url: https://geratt.itch.io/
      - icon: /github2.svg
        url: https://github.com/JamesGerah 
      - icon: /linkedin.svg
        url: "https://www.linkedin.com/in/james-geraty-852398252/"

  # About
  about:
    enable: true
    title: "About Me"
    image: "/images/photos/IMG (17).jpg"
    roundImage: false # Make hero image circular | default false
    content: |-
     Though Design is my forte, I have an ecclectic set of skills which I have put to use in the various projects I have completed and worked on over the course of the past half decade
     When it comes to design my focus is to make each project a unique experience that can speak to those who play or otherwise interact with it. To achieve this, I always start with
     a theme, then wherever possible make every facet of the game work towards reinforcing that theme. 
       
     Here are a few of the aforementioned skills:                               
      
    skills:
      enable: true
      title: ""
      items:
        - "Unity"
        - "Unreal"
        - "Blender"
        - "Logic"
        - "Github"
        

  # Experience
  experience:
    enable: true
    title: "Professional Experience"
    items:
      - company: "Team Hydra"
        #companyUrl: ""
        jobs:
          - name: "Game Designer"
            date: "Septemer 2023 - present"
            content: "Team Hydra is new studio that is made up of me and a handful of classmates from my university course. Initially made for the sake of doing group work, it has since metamorphosed into
             something we are proud enough to want to develop post-university. This is because over the past 2 years, we have been working on our own stealth game (a demo of which is on my itch.io page)
             and we believe that is has the right stuff for Tranzfuser. This being a game development competition with winners receiving funding for their game.

             For the team, I have worked as one of 2 game designers. Working closely with the other we came up with the game itself, and as of late I have been in charge of all things related to the level 
             design."

      - company: "Danveria"
        companyUrl: "http://danveria.com/"
        jobs:
          - name: "Lead Unity Developer"
            date: "April - May 2021"
            
            content: |
              During college I received the oppourtunity to work as part of Danveria during the work experience section of the module.
              For this project I was assigned as the head of all things done in engine. This involved overseeing about 10 others, seeing to it they knew what they
              were doing, and making sure all of their work ended up in the right places.

              - Organised the other in-engine designers.
              - Aggregated all of the work onto one build.
              - Created levels for the game

      - company: "The British Army"
        companyUrl: "https://www.army.mod.uk/"
        jobs:
        - name: "Combat Engineer"
          date: "March - December 2020"
          content: "The Army was the only proper job I had before going into education for games. And although it does not sound as relevant as my other experience, the time spent there was
           integral for learning confidence in myself, how to work as part of a team, as well leading people.

              I was in the Royal Engineers, which means alongside leadership and teamwork, I also can blow things up!"
         

  tcccost:
   enable: true
    /images/photos/IMG (2).jpg 
      

